baseURL: "https://dingfanx.com/"
languageCode: "zh-cn"
title: "Dingfan X."
theme: "PaperMod"

# 启用代码高亮、目录、阅读时长等
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

# 文章目录结构
permalinks:
  posts: "/:section/:slug/"

# 主菜单 - 三分类导航
menu:
  main:
    - identifier: tech
      name: 技术
      url: /tech/
      weight: 10
    - identifier: research
      name: 投研
      url: /research/
      weight: 20
    - identifier: workshop
      name: 工坊
      url: /workshop/
      weight: 30
    - identifier: news
      name: 旧思
      url: /news/
      weight: 40
    - identifier: reading
      name: 阅读
      url: /reading/
      weight: 50
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 60
    - identifier: about
      name: 关于
      url: /about/
      weight: 70

# 主题参数
params:
  env: production
  title: "Dingfan X."
  description: "技术 · 投研 · 工坊 · 旧思 · 阅读"
  author: "Dingfan"
  defaultTheme: auto  # 跟随系统暗色/亮色
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  copyrightText: "© 2026 Dingfan. 本站内容仅代表作者个人观点与学习记录,不构成任何投资建议或专业意见。"
  
  homeInfoParams:
    Title: "Dingfan X."
    Content: |
      这里记录技术学习、财经思考、中外文学。

socialIcons:
  - name: github
    url: "https://github.com/ddd829"
  - name: email
    url: "mailto:comments@dingfanx.com"

  assets:
  favicon: "/favicon.ico"
  favicon16x16: "/favicon-16x16.png"
  favicon32x32: "/favicon-32x32.png"
  apple_touch_icon: "/apple-touch-icon.png"

  copyright: "© 2026 Dingfan. 本站内容采用 [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/) 协议。"

# 代码高亮配置
markup:
  highlight:
    style: github-dark
    lineNos: true
    codeFences: true
    guessSyntax: true
  goldmark:
    renderer:
      unsafe: true  # 允许 markdown 里写 HTML

# 输出格式 - 启用搜索功能
outputs:
  home:
    - HTML
    - RSS
    - JSON